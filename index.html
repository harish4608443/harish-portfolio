<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harish Renganathan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ╔══════════════════════════════════╗ -->
<!--   STARFIELD CANVAS (background)     -->
<!-- ╚══════════════════════════════════╝ -->
<canvas id="stars"></canvas>

<!-- ── SOLAR SYSTEM STAGE ── -->
<div id="solar">

  <!-- SUN (center — that's you) -->
  <div id="sun">
    <div id="sun-corona"></div>
    <div id="sun-body">
      <div id="sun-initials">HR</div>
      <div id="sun-name">Harish<br/><em>Renganathan</em></div>
      <div id="sun-role"><span id="tw-text"></span><span class="tw-cur">|</span></div>
    </div>
    <div id="sun-chips">
      <span>M.Sc. CS</span>
      <span>Stuttgart</span>
      <span>May 2026</span>
    </div>
  </div>

  <!-- ORBITS + PLANETS injected by JS -->
  <div id="orbits"></div>

</div>

<!-- ── PLANET CARD PANEL (flies in from right) ── -->
<div id="panel" class="hidden">
  <button id="panel-close">✕</button>
  <div id="panel-header">
    <div id="panel-icon"></div>
    <div>
      <div id="panel-category"></div>
      <div id="panel-title"></div>
    </div>
  </div>
  <div id="panel-body"></div>
  <div id="panel-tags"></div>
</div>

<!-- ── HINT ── -->
<div id="hint">Hover a planet · Click to explore</div>

<script src="os.js"></script>
</body>
</html>
