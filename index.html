<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harish Renganathan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ╔══════════════════════════════════╗ -->
<!--   TABLE SURFACE                     -->
<!-- ╚══════════════════════════════════╝ -->
<div id="table">
  <div id="felt"></div>
  <div id="table-grain"></div>

  <!-- ── INTRO CARD (hero, always visible center) ── -->
  <div id="intro">
    <div class="intro-avatar">HR</div>
    <h1 class="intro-name">Harish<br/><em>Renganathan</em></h1>
    <p class="intro-role" id="tw"><span id="tw-text"></span><span class="tw-cur">|</span></p>
    <div class="intro-chips">
      <span>📍 Stuttgart</span>
      <span>🎓 M.Sc. CS</span>
      <span>✅ May 2026</span>
    </div>
    <p class="intro-hint">Pick up a deck below ↓</p>
  </div>

  <!-- ── DECK AREA ── -->
  <div id="decks">

    <!-- DECK: About -->
    <div class="deck-wrap" id="deck-about">
      <div class="deck-label">About</div>
      <div class="deck" data-deck="about">
        <!-- Cards injected by JS -->
      </div>
    </div>

    <!-- DECK: Experience -->
    <div class="deck-wrap" id="deck-experience">
      <div class="deck-label">Experience</div>
      <div class="deck" data-deck="experience"></div>
    </div>

    <!-- DECK: Projects -->
    <div class="deck-wrap" id="deck-projects">
      <div class="deck-label">Projects</div>
      <div class="deck" data-deck="projects"></div>
    </div>

    <!-- DECK: Skills -->
    <div class="deck-wrap" id="deck-skills">
      <div class="deck-label">Skills</div>
      <div class="deck" data-deck="skills"></div>
    </div>

    <!-- DECK: Contact -->
    <div class="deck-wrap" id="deck-contact">
      <div class="deck-label">Contact</div>
      <div class="deck" data-deck="contact"></div>
    </div>

  </div><!-- /decks -->

</div><!-- /table -->

<!-- ── CARD VIEWER (full-screen flip overlay) ── -->
<div id="viewer" class="hidden">
  <div id="viewer-scene">
    <div id="viewer-card">
      <div class="vc-front" id="vc-front"></div>
      <div class="vc-back"  id="vc-back"></div>
    </div>
  </div>
  <div id="viewer-nav">
    <button id="nav-prev">←</button>
    <span id="nav-pos"></span>
    <button id="nav-next">→</button>
  </div>
  <button id="viewer-close">✕</button>
  <div id="viewer-hint">Click card to flip &nbsp;·&nbsp; ← → to browse</div>
</div>

<script src="os.js"></script>
</body>
</html>
